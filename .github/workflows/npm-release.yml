name: npm release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            executable: trough
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            executable: trough
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin-x64
            executable: trough
          - os: macos-15
            target: aarch64-apple-darwin
            platform: darwin-arm64
            executable: trough
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            executable: trough.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: win32-arm64
            executable: trough.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: ilammy/msvc-dev-cmd@v1
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.platform }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" "dist/${{ matrix.platform }}/${{ matrix.executable }}"
          tar -czf "${{ matrix.platform }}.tar.gz" -C dist "${{ matrix.platform }}"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: ${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - test
      - build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: artifacts
          merge-multiple: true
      - name: Unpack binaries
        shell: bash
        run: |
          mkdir -p dist
          for archive in artifacts/*.tar.gz; do
            tar -xzf "$archive" -C dist
          done
      - run: npm run check:npm-dist
      - run: npm pack --dry-run
        env:
          TROUGH_SKIP_BUILD: "1"
      - run: npm publish --provenance
        env:
          TROUGH_SKIP_BUILD: "1"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
