name: Auto Tag Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag if not exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read package.json version
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read Cargo.toml version
        id: cargo_version
        run: echo "version=$(grep '^version = ' Cargo.toml | head -1 | cut -d'\"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Validate versions match
        run: |
          if [ "${{ steps.pkg_version.outputs.version }}" != "${{ steps.cargo_version.outputs.version }}" ]; then
            echo "::error::Version mismatch: package.json=${{ steps.pkg_version.outputs.version }}, Cargo.toml=${{ steps.cargo_version.outputs.version }}"
            exit 1
          fi
          echo "Versions match: v${{ steps.pkg_version.outputs.version }}"

      - name: Check if tag already exists on remote
        id: check_tag
        env:
          TAG: v${{ steps.pkg_version.outputs.version }}
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists on remote."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist on remote."
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        env:
          TAG: v${{ steps.pkg_version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag ${TAG}."

      - name: Skip - tag already exists
        if: steps.check_tag.outputs.exists == 'true'
        run: echo "Tag already exists on remote, skipping creation."
